	<script>
var t = null;
    t = setTimeout(time,1000);//開始运行
    function padZero(num) {
      return num < 10 ? "0" + num : "" + num;
    }
    function time()
    {
       clearTimeout(t);//清除定时器
       var dt = new Date();
		var y=dt.getFullYear();
		var mt=padZero(dt.getMonth()+1);
		var day=padZero(dt.getDate());
       var h=padZero(dt.getHours());//获取时
       var m=padZero(dt.getMinutes());//获取分
       var s=padZero(dt.getSeconds());//获取秒
       var week = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][dt.getDay()];
       document.getElementById("showTime").innerHTML =
         '<span class="datetime-group">' +
           '<span class="date-line">'+ y + '年' + mt + '月' + day + '日</span>' +
           '<span class="time-line">' + h + ':' + m + ':' + s + '</span>' +
         '</span>' +
         '<span class="week-line">' + week + '</span>';
       t = setTimeout(time,1000); //设定定时器，循环运行     
    } 

    function isFullscreenMode() {
      return !!(
        document.fullscreenElement ||
        document.webkitFullscreenElement ||
        document.msFullscreenElement
      );
    }

    function updateFullscreenButton() {
      var btn = document.getElementById("fullscreenToggle");
      if (!btn) return;
      var inFullscreen = isFullscreenMode();
      btn.innerHTML = inFullscreen ? "退出全屏" : "全屏显示";
      document.body.classList.toggle("is-fullscreen", inFullscreen);
    }

    function toggleFullscreen() {
      var docEl = document.documentElement;
      if (!isFullscreenMode()) {
        if (docEl.requestFullscreen) {
          docEl.requestFullscreen();
        } else if (docEl.webkitRequestFullscreen) {
          docEl.webkitRequestFullscreen();
        } else if (docEl.msRequestFullscreen) {
          docEl.msRequestFullscreen();
        }
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    }

    function initFullscreenToggle() {
      var btn = document.getElementById("fullscreenToggle");
      if (!btn) return;
      btn.addEventListener("click", toggleFullscreen);
      document.addEventListener("fullscreenchange", updateFullscreenButton);
      document.addEventListener("webkitfullscreenchange", updateFullscreenButton);
      document.addEventListener("msfullscreenchange", updateFullscreenButton);
      updateFullscreenButton();
    }

    initFullscreenToggle();

</script>
